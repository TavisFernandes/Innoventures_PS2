services:
  - type: web
    name: plugmind-backend
    runtime: python
    plan: free
    rootDir: Backend
    buildCommand: "pip install -r requirements-render.txt"
    startCommand: "uvicorn api.index:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: "/health"
    autoDeploy: true
