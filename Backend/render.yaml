services:
  - type: web
    name: plugmind-backend
    env: python
    plan: free
    buildCommand: "pip install fastapi uvicorn python-multipart"
    startCommand: "python api/index.py"
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
    healthCheckPath: "/health"
    healthCheckTimeout: 30
    autoDeploy: true
